# Cloud Build config for the web service.
#
# NEXT_PUBLIC_* env vars are baked into the Next.js client bundle at build
# time, so we have to pass the gateway URL as a Docker build-arg here rather
# than as a Cloud Run env var. The default in services/web/Dockerfile is the
# local docker-compose URL; this build overrides it with the deployed
# gateway's wss:// URL.
#
# Submit with:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_GATEWAY_WS_URL=wss://gateway-host/ws/session,_TAG=phase1

substitutions:
  _GATEWAY_WS_URL: ws://localhost:8080/ws/session
  _TAG: phase1

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_GATEWAY_WS_URL=${_GATEWAY_WS_URL}
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/sales-copilot/web:${_TAG}
      - .

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/sales-copilot/web:${_TAG}
